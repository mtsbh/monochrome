[build]
  command = "npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[edge_functions]
  directory = "netlify/edge-functions"

[[redirects]]
  from = "/api/label"
  to = "/.netlify/functions/label"
  status = 200

[[redirects]]
  from = "/api/contributors"
  to = "/.netlify/functions/contributors"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
